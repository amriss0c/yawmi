name: wirdi
description: Daily task tracker with Gregorian and Hijri calendar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  hijri: ^3.0.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  file_picker: ^8.0.0
  csv: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/