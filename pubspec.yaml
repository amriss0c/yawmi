name: wirdi
description: Daily task tracker with Gregorian and Hijri calendar.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  sqflite: ^2.3.2
  path: ^1.9.0
  hijri: ^3.0.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  intl: ^0.20.2
  file_picker: ^10.3.10
  csv: ^7.2.0
  flutter_local_notifications: ^21.0.0
  timezone: ^0.11.0
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/